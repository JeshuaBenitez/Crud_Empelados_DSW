services:
  postgres:
    image: postgres:16
    container_name: empleados-postgres
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-empleados_db}
      POSTGRES_USER: ${APP_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-postgres}
    ports:
      - "${APP_DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-postgres} -d ${APP_DB_NAME:-empleados_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_net

  api:
    build:
      context: ./DSW02-Practica01
      dockerfile: Dockerfile
    container_name: empleados-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${APP_DB_NAME:-empleados_db}
      SPRING_DATASOURCE_USERNAME: ${APP_DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD:-postgres}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/${APP_DB_NAME:-empleados_db}
      SPRING_FLYWAY_USER: ${APP_DB_USER:-postgres}
      SPRING_FLYWAY_PASSWORD: ${APP_DB_PASSWORD:-postgres}
      APP_BASIC_USER: ${APP_BASIC_USER:-admin}
      APP_BASIC_PASSWORD: ${APP_BASIC_PASSWORD:-admin123}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-jwt-secret-change-me-to-at-least-32-bytes-key}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-3600000}
    networks:
      - backend_net

  frontend:
    build:
      context: ./frontend-angular
      dockerfile: Dockerfile
    container_name: empleados-frontend
    depends_on:
      - api
    ports:
      - "4200:4200"
    networks:
      - backend_net

volumes:
  postgres_data:

networks:
  backend_net:
    driver: bridge
