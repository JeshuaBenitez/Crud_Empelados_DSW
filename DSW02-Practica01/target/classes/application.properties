spring.application.name=dsw02-practica01

spring.datasource.url=jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5433}/${APP_DB_NAME:empleados_db}
spring.datasource.username=${APP_DB_USER:postgres}
spring.datasource.password=${APP_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

app.security.basic.username=${APP_BASIC_USER:admin}
app.security.basic.password=${APP_BASIC_PASSWORD:admin123}
app.security.jwt.secret=${APP_JWT_SECRET:jwt-secret-change-me-to-at-least-32-bytes-key}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.swagger-ui.path=/swagger-ui.html
